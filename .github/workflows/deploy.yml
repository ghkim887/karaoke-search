name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm --filter @karaoke/web build
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3.0.1
        with:
          path: apps/web/dist
      - name: Upload dist for e2e
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 1

  e2e:
    # Re-uses the `dist/` artifact from the `build` job — exercises the exact
    # bytes that `deploy-pages` ships, skipping the slow rebuild step.
    needs: build
    runs-on: ubuntu-latest
    # AUDIT 2026-04-29: continue-on-error masks E2E regressions. Review by
    # 2026-05-29: if the last 4 weekly runs are green, remove this flag and
    # treat E2E as required; otherwise extend with a new review date.
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install dependencies
        # Still required: Playwright CLI runs from node_modules. The savings
        # come from skipping `pnpm -r build` (the slow step).
        run: pnpm install --frozen-lockfile
      - name: Download dist artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: web-dist
          path: apps/web/dist
      - name: Install Playwright browsers
        run: pnpm --filter @karaoke/web exec playwright install --with-deps chromium
      - name: Start preview server and wait until ready
        run: |
          nohup pnpm --filter @karaoke/web exec astro preview --host 127.0.0.1 --port 4321 > /tmp/preview.log 2>&1 &
          echo $! > /tmp/preview.pid
          disown
          deadline=$((SECONDS + 30))
          while (( SECONDS < deadline )); do
            if curl -fsS http://127.0.0.1:4321/karaoke-search/ > /dev/null; then
              echo "preview ready after $((SECONDS))s"
              exit 0
            fi
            sleep 1
          done
          echo "preview did not start within 30s. Server log:"
          cat /tmp/preview.log
          exit 1
      - name: Run E2E tests
        env:
          E2E_BASE_URL: http://127.0.0.1:4321/karaoke-search/
        run: pnpm --filter @karaoke/web test:e2e

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4.0.5
