name: crawl

on:
  schedule:
    - cron: '0 18 * * 6'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max artists to crawl (0 = no limit)'
        required: false
        type: number
        default: 0

concurrency:
  group: crawl
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v4.4.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Restore HTTP cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: .cache/http.json
          key: "crawl-http-${{ github.run_id }}"
          restore-keys: |
            crawl-http-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r build

      - name: Verify drop-list sidecar is in sync (Fix E.4)
        # The sidecar JSON at packages/crawler/src/adapters/tj-media-direct/
        # korean-artist-drop-list.json is the source-of-truth for the Python
        # consumers (scripts/ingest-anisong-pdf.py + scripts/drop-kpop-leaks.py).
        # It is regenerated by scripts/export-drop-list.mjs (wired into the
        # crawler's build script chain). After `pnpm -r build` above, the
        # sidecar should be byte-identical to git. If it isn't, a maintainer
        # edited the TS drop list without re-running the build / forgot to
        # commit the regenerated sidecar — fail loudly here so the silent-
        # drift class never reaches a deploy.
        run: |
          node scripts/export-drop-list.mjs
          git diff --exit-code packages/crawler/src/adapters/tj-media-direct/korean-artist-drop-list.json

      - name: Run crawler
        # Fix E.2 (2026-05-01): pass `inputs.limit` via env-var rather than
        # direct `${{ ... }}` interpolation into the run-script. Defense-in-
        # depth against shell injection — if a user-provided value ever
        # contained shell metacharacters, the env-var path would still treat
        # it as a single argument, while raw interpolation would expand it
        # into the shell's parser.
        env:
          LIMIT: ${{ inputs.limit || 0 }}
        run: pnpm --filter @karaoke/crawler start --limit "$LIMIT" --out apps/web/public/data/songs.json.tmp --conflicts-out /tmp/merge-conflicts.json

      - name: Atomic rename output
        run: node -e "require('node:fs').renameSync('apps/web/public/data/songs.json.tmp','apps/web/public/data/songs.json')"

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'

      - name: Apply TJ anisong PDF section tags
        run: python scripts/ingest-anisong-pdf.py

      - name: Replay merger after anisong PDF ingest
        run: node scripts/replay-merger.mjs

      - name: Validate post-ingest songs.json against schema
        run: node scripts/validate-songs-json.mjs apps/web/public/data/songs.json

      - name: Compose PR body with merge-conflict summary
        id: pr_body
        run: |
          {
            echo 'body<<EOF'
            echo 'Automated crawl output. See workflow run for logs.'
            if [ -f /tmp/merge-conflicts.json ]; then
              total=$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('/tmp/merge-conflicts.json','utf8')).total)")
              if [ "$total" -gt 0 ]; then
                echo ''
                echo '## Merge conflicts during dedup'
                echo "- Total: $total"
                echo '- Sample (first 10):'
                node -e "
                  const s = JSON.parse(require('node:fs').readFileSync('/tmp/merge-conflicts.json','utf8'));
                  for (const c of s.sample) {
                    const vs = c.values.map(v => \`\${v.source}=\${v.value}\`).join(', ');
                    console.log(\`  - \${c.field}: \${vs} -> winner: \${c.winner} (cluster_key=\${c.cluster_key})\`);
                  }
                "
              fi
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Close prior crawl PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr list --label crawl-output --state open --json number -q '.[].number' | xargs -r -n1 gh pr close

      - name: Create pull request
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c  # v6.1.0
        with:
          branch: "crawl/${{ github.run_id }}"
          commit-message: "data: weekly crawl ${{ github.run_id }}"
          title: "data: weekly crawl ${{ github.run_id }}"
          body: ${{ steps.pr_body.outputs.body }}
          labels: crawl-output
          add-paths: apps/web/public/data/songs.json
