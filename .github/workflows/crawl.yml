name: crawl

on:
  schedule:
    - cron: '0 18 * * 6'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max artists to crawl (0 = no limit)'
        required: false
        type: number
        default: 0

concurrency:
  group: crawl
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v4.4.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Restore HTTP cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: .cache/http.json
          key: "crawl-http-${{ github.run_id }}"
          restore-keys: |
            crawl-http-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r build

      - name: Verify all sidecars are in sync
        # Five JSON sidecars are auto-generated from their TS sources during
        # `pnpm -r build` (above). After the build, each sidecar must be
        # byte-identical to its committed version. If it isn't, a maintainer
        # edited the TS source without re-running the build / forgot to commit
        # the regenerated sidecar — fail loudly so silent drift never reaches
        # a deploy.
        #
        # Sidecars covered:
        #   korean-artist-drop-list.json  — from koreanArtistDropList.ts
        #   chinese-artist-drop-list.json — from chineseArtistDropList.ts
        #   post-category-overrides.json  — from crawler.ts POST_CATEGORY_OVERRIDES
        #   clustering-rules.json         — from clustering.ts SPLIT_RE_SOURCE/FLAGS
        #   category-priority.json        — from schema/index.ts CATEGORY_PRIORITY
        run: |
          for sidecar in \
            packages/crawler/src/adapters/tj-media-direct/korean-artist-drop-list.json \
            packages/crawler/src/adapters/tj-media-direct/chinese-artist-drop-list.json \
            packages/crawler/src/adapters/jpop-playlist-blog/post-category-overrides.json \
            packages/crawler/src/clustering-rules.json \
            packages/schema/category-priority.json; do
            git diff --exit-code -- "$sidecar" || { echo "Sidecar drift detected: $sidecar"; exit 1; }
          done

      - name: Run crawler
        # Fix E.2 (2026-05-01): pass `inputs.limit` via env-var rather than
        # direct `${{ ... }}` interpolation into the run-script. Defense-in-
        # depth against shell injection — if a user-provided value ever
        # contained shell metacharacters, the env-var path would still treat
        # it as a single argument, while raw interpolation would expand it
        # into the shell's parser.
        env:
          LIMIT: ${{ inputs.limit || 0 }}
        run: pnpm --filter @karaoke/crawler start --limit "$LIMIT" --out apps/web/public/data/songs.json.tmp --conflicts-out /tmp/merge-conflicts.json

      - name: Atomic rename output
        run: node -e "require('node:fs').renameSync('apps/web/public/data/songs.json.tmp','apps/web/public/data/songs.json')"

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'

      - name: Verify splitter regex parity (TS ↔ Python)
        # Asserts that clustering-rules.json splitterPattern matches the
        # SPLIT_RE_SOURCE constant in clustering.ts byte-for-byte. Catches the
        # case where a developer edits the TS source but forgets to rebuild and
        # commit the sidecar (the sidecar gate above catches the committed-but-
        # stale case; this test catches the TS-vs-sidecar divergence at source).
        run: python -m unittest scripts/test_splitter_parity.py

      - name: Apply TJ anisong PDF section tags
        run: python scripts/ingest_anisong_pdf.py

      - name: Strip transliteration title_ko from tj-/tjpdf- records (Stage 1)
        run: python scripts/normalize_tj_title_ko.py apps/web/public/data/songs.json

      - name: Replay merger after anisong PDF ingest
        run: node scripts/replay-merger.mjs

      - name: Apply blog post-id category overrides
        run: python scripts/retag_blog_vocaloid_mistags.py

      - name: Drop Korean-artist (KPOP) leak records
        run: python scripts/drop_kpop_leaks.py

      - name: Drop Chinese-artist (Cpop) leak records
        run: python scripts/drop_cpop_leaks.py

      # Stage 2 LLM cache replay is a nice-to-have enhancement layer — if a
      # malformed cache file slips into a PR, we still want the weekly crawl
      # PR to open with the unsealed (un-translated) corpus. The next Stage 2
      # operator run fixes the cache.
      - name: Apply cached LLM title_ko translations (Stage 2 replay)
        continue-on-error: true
        run: node scripts/translate_title_ko_via_agents.mjs merge apps/web/public/data/songs.json scripts/data

      - name: Apply manual title_ko fixes
        run: node scripts/apply-manual-title-ko-fixes.mjs apps/web/public/data/songs.json scripts/data/title-ko-manual-fixes.json

      - name: Prune stale tj-search-cache entries
        run: node scripts/prune-artist-nationality-cache.mjs

      - name: Validate post-ingest songs.json against schema
        run: node scripts/validate-songs-json.mjs apps/web/public/data/songs.json

      - name: Compose PR body with merge-conflict summary
        run: |
          PR_BODY_FILE="${RUNNER_TEMP}/pr_body.md"
          printf '%s\n' 'Automated crawl output. See workflow run for logs.' > "$PR_BODY_FILE"
          if [ -f /tmp/merge-conflicts.json ]; then
            total=$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('/tmp/merge-conflicts.json','utf8')).total)")
            if [ "$total" -gt 0 ]; then
              printf '\n' >> "$PR_BODY_FILE"
              printf '%s\n' '## Merge conflicts during dedup' >> "$PR_BODY_FILE"
              printf '%s\n' "- Total: $total" >> "$PR_BODY_FILE"
              printf '%s\n' '- Sample (first 10):' >> "$PR_BODY_FILE"
              node -e "
                const s = JSON.parse(require('node:fs').readFileSync('/tmp/merge-conflicts.json','utf8'));
                for (const c of s.sample) {
                  const vs = c.values.map(v => \`\${v.source}=\${v.value}\`).join(', ');
                  process.stdout.write(\`  - \${c.field}: \${vs} -> winner: \${c.winner} (cluster_key=\${c.cluster_key})\n\`);
                }
              " >> "$PR_BODY_FILE"
            fi
          fi

      - name: Close prior crawl PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr list --label crawl-output --state open --json number -q '.[].number' | xargs -r -n1 gh pr close

      - name: Create pull request
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c  # v6.1.0
        with:
          branch: "crawl/${{ github.run_id }}"
          commit-message: "data: weekly crawl ${{ github.run_id }}"
          title: "data: weekly crawl ${{ github.run_id }}"
          body-path: ${{ runner.temp }}/pr_body.md
          labels: crawl-output
          add-paths: apps/web/public/data/songs.json
